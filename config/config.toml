[[routes]]
path = "/users"
upstreams = [
  "http://localhost:3001",
  "http://localhost:3003",
]
health_path = "/health"

[[routes]]
path = "/orders"
upstreams = [
  "http://localhost:3002",
  "http://localhost:3004",
]
health_path = "/health"

# JWT Configuration
[jwt]
secret = "your-super-secret-jwt-key-change-this-in-production"
token_expiry_hours = 24

# Rate Limiting Configuration
[rate_limit]
requests_per_minute = 60

# Health Check Configuration
[health]
interval_seconds = 10
